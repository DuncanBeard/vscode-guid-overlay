<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DiceBear Style Preview</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 20px;
      margin: 0;
    }
    h1 {
      text-align: center;
      color: #fff;
    }
    h2 {
      color: #569cd6;
      border-bottom: 1px solid #333;
      padding-bottom: 10px;
    }
    .guid-section {
      margin-bottom: 40px;
    }
    .guid-label {
      font-family: 'Consolas', 'Courier New', monospace;
      background: #2d2d2d;
      padding: 8px 12px;
      border-radius: 4px;
      margin-bottom: 15px;
      display: inline-block;
    }
    .styles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 20px;
    }
    .style-card {
      background: #2d2d2d;
      border-radius: 8px;
      padding: 15px;
      text-align: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .style-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }
    .style-card img {
      width: 100px;
      height: 100px;
      border-radius: 8px;
      background: #3d3d3d;
    }
    .style-name {
      margin-top: 10px;
      font-size: 14px;
      color: #9cdcfe;
    }
    .controls {
      background: #2d2d2d;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 30px;
    }
    .controls input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      font-family: 'Consolas', monospace;
      background: #1e1e1e;
      border: 1px solid #444;
      color: #d4d4d4;
      border-radius: 4px;
    }
    .controls button {
      margin-top: 10px;
      padding: 10px 20px;
      background: #0e639c;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    .controls button:hover {
      background: #1177bb;
    }
  </style>
</head>
<body>
  <h1>DiceBear Avatar Style Preview</h1>

  <div class="controls">
    <input type="text" id="customGuid" placeholder="Enter a custom GUID to preview..." />
    <button onclick="addCustomGuid()">Add GUID</button>
    <button onclick="generateRandomGuid()">Generate Random GUID</button>
  </div>

  <div id="previews"></div>

  <script>
    const styles = [
      'adventurer',
      'adventurer-neutral',
      'avataaars',
      'avataaars-neutral',
      'big-ears',
      'big-ears-neutral',
      'big-smile',
      'bottts',
      'bottts-neutral',
      'croodles',
      'croodles-neutral',
      'dylan',
      'fun-emoji',
      'glass',
      'icons',
      'identicon',
      'initials',
      'lorelei',
      'lorelei-neutral',
      'micah',
      'miniavs',
      'notionists',
      'notionists-neutral',
      'open-peeps',
      'personas',
      'pixel-art',
      'pixel-art-neutral',
      'rings',
      'shapes',
      'thumbs'
    ];

    const exampleGuids = [
      'f5591ecc-0242-4ab5-950d-9badd1375f11',
      '38d82609-f578-4257-91b9-cf775a261751',
      '3f7ad59e-1d2a-4f65-8eac-600754c68ee7',
      'dbebdff6-dbeb-43cf-900a-1b4dd88ca90a'
    ];

    function createGuidSection(guid) {
      const section = document.createElement('div');
      section.className = 'guid-section';
      section.innerHTML = `
        <h2>GUID Preview</h2>
        <div class="guid-label">${guid}</div>
        <div class="styles-grid">
          ${styles.map(style => `
            <div class="style-card">
              <img src="https://api.dicebear.com/9.x/${style}/svg?seed=${encodeURIComponent(guid)}"
                   alt="${style}"
                   loading="lazy" />
              <div class="style-name">${style}</div>
            </div>
          `).join('')}
        </div>
      `;
      return section;
    }

    function renderPreviews() {
      const container = document.getElementById('previews');
      container.innerHTML = '';
      exampleGuids.forEach(guid => {
        container.appendChild(createGuidSection(guid));
      });
    }

    function addCustomGuid() {
      const input = document.getElementById('customGuid');
      const guid = input.value.trim();
      if (guid) {
        exampleGuids.unshift(guid);
        input.value = '';
        renderPreviews();
      }
    }

    function generateRandomGuid() {
      const guid = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
      exampleGuids.unshift(guid);
      renderPreviews();
    }

    // Initial render
    renderPreviews();
  </script>
</body>
</html>
