#################################################################################
#                        OneBranch Official Build Pipeline                       #
#             GUID Visual Overlay VS Code Extension                              #
#################################################################################
# https://eng.ms/docs/products/onebranch
# https://eng.ms/docs/coreai/devdiv/one-engineering-system-1es/1es-docs/1es-pipeline-templates

name: $(Build.SourceBranchName)-$(Date:yyyyMMdd)$(Rev:.r)

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - '*.md'
      - '.github/**'

pr:
  branches:
    include:
      - main
  paths:
    exclude:
      - '*.md'
      - '.github/**'

resources:
  repositories:
    - repository: 1ESPipelineTemplates
      type: git
      name: 1ESPipelineTemplates/1ESPipelineTemplates
      ref: refs/tags/release

variables:
  # Build configuration
  CDP_DEFINITION_BUILD_COUNT: $[counter('', 0)]
  ROOT: $(Build.SourcesDirectory)
  REPOROOT: $(Build.SourcesDirectory)
  OUTPUTROOT: $(REPOROOT)/out

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    pool:
      name: Azure-Pipelines-1ESPT-ExDShared
      image: ubuntu-latest
      os: linux

    customBuildTags:
      - VSCodeExtension
      - NodeJS

    sdl:
      sourceAnalysisPool:
        name: Azure-Pipelines-1ESPT-ExDShared
        image: windows-latest
        os: windows
      credscan:
        enabled: true
        suppressionsFile: $(Build.SourcesDirectory)/.config/CredScanSuppressions.json
      binskim:
        enabled: false  # Not applicable for Node.js/JavaScript
      policheck:
        enabled: true
        break: false

    stages:
      - stage: Build
        displayName: 'Build & Test'
        jobs:
          - job: BuildAndTest
            displayName: 'Build, Test & Package'
            templateContext:
              outputs:
                - output: pipelineArtifact
                  displayName: 'Publish VSIX artifact'
                  targetPath: $(OUTPUTROOT)
                  artifactName: vsix

            steps:
              - task: NodeTool@0
                displayName: 'Install Node.js 20.x'
                inputs:
                  versionSpec: '20.x'

              - script: |
                  curl -fsSL https://bun.sh/install | bash
                  echo "##vso[task.prependpath]$HOME/.bun/bin"
                displayName: 'Install Bun'

              - script: bun install
                displayName: 'Install dependencies'
                workingDirectory: $(Build.SourcesDirectory)

              - script: bun run build
                displayName: 'Build extension'
                workingDirectory: $(Build.SourcesDirectory)

              - script: bun test
                displayName: 'Run tests'
                workingDirectory: $(Build.SourcesDirectory)

              - script: |
                  npm install -g @vscode/vsce
                  mkdir -p $(OUTPUTROOT)
                  vsce package --no-dependencies --out $(OUTPUTROOT)
