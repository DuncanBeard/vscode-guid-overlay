parameters:
  - name: buildType
    displayName: "Build type"
    type: string
    default: "CI"
    values:
      - CI
      - Official

steps:
  - task: NodeTool@0
    displayName: "Install Node.js"
    inputs:
      versionSpec: "20.x"

  - script: npm ci --registry https://registry.npmjs.org
    displayName: "Install dependencies"

  - script: npm test
    displayName: "Run tests"

  - script: npm run vscode:prepublish
    displayName: "Production build"

  - script: |
      npx @vscode/vsce package --out $(Build.ArtifactStagingDirectory)/guid-visual-overlay.vsix
    displayName: "Package VSIX"
