parameters:
  - name: buildType
    displayName: "Build type"
    type: string
    default: "CI"
    values:
      - CI
      - Official

steps:
  - script: |
      node --version
      npm install -g bun
    displayName: "Install Bun"

  - script: bun install --frozen-lockfile
    displayName: "Install dependencies"

  - script: bun test
    displayName: "Run tests"

  - script: bun run vscode:prepublish
    displayName: "Production build"

  - script: |
      npm install -g @vscode/vsce
      vsce package --out $(Build.ArtifactStagingDirectory)/guid-visual-overlay.vsix
    displayName: "Package VSIX"
