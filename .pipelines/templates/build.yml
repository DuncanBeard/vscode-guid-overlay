parameters:
  - name: buildType
    displayName: "Build type"
    type: string
    default: "CI"
    values:
      - CI
      - Official

steps:
  - task: NodeTool@0
    displayName: "Install Node.js"
    inputs:
      versionSpec: "20.x"

  - script: |
      echo "registry=https://pkgs.dev.azure.com/piemini/iPIE/_packaging/iPIE/npm/registry/" > .npmrc
      echo "always-auth=true" >> .npmrc
    displayName: "Configure npm registry"

  - task: npmAuthenticate@0
    displayName: "Authenticate npm feed"
    inputs:
      workingFile: .npmrc

  - script: npm ci
    displayName: "Install dependencies"

  - script: npm test
    displayName: "Run tests"

  - script: npm run vscode:prepublish
    displayName: "Production build"

  - script: |
      npx @vscode/vsce package --out $(Build.ArtifactStagingDirectory)/guid-visual-overlay.vsix
    displayName: "Package VSIX"
