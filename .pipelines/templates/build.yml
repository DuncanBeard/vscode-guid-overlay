parameters:
  - name: buildType
    displayName: "Build type"
    type: string
    default: "CI"
    values:
      - CI
      - Official

steps:
  - script: |
      node --version
      npm --version
    displayName: "Check Node.js"

  - task: Npm@1
    displayName: "Install dependencies"
    inputs:
      command: ci

  - script: npm test
    displayName: "Run tests"

  - script: npm run vscode:prepublish
    displayName: "Production build"

  - script: |
      npx @vscode/vsce package --out $(Build.ArtifactStagingDirectory)/guid-visual-overlay.vsix
    displayName: "Package VSIX"
