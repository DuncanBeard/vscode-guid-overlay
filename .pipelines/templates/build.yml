parameters:
  - name: buildType
    displayName: "Build type"
    type: string
    default: "CI"
    values:
      - CI
      - Official

steps:
  - task: NodeTool@0
    displayName: "Install Node.js"
    inputs:
      versionSpec: "20.x"

  - script: |
      echo "registry=https://pkgs.dev.azure.com/piemini/iPIE/_packaging/iPIE/npm/registry/" > .npmrc
      echo "always-auth=true" >> .npmrc
    displayName: "Configure npm registry"

  - task: npmAuthenticate@0
    displayName: "Authenticate npm feed"
    inputs:
      workingFile: .npmrc

  - script: npm ci
    displayName: "Install dependencies"

  - script: npm test
    displayName: "Run tests"

  - script: |
      MAJOR_MINOR=$(node -p "require('./package.json').version.split('.').slice(0,2).join('.')")
      VERSION="${MAJOR_MINOR}.$(Build.BuildId)"
      echo "##vso[task.setvariable variable=EXTENSION_VERSION]${VERSION}"
      echo "##vso[build.updatebuildnumber]${VERSION}"
      node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); p.version='${VERSION}'; fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
      echo "Extension version set to: ${VERSION}"
    displayName: "Stamp version from pipeline"

  - script: npm run vscode:prepublish
    displayName: "Production build"

  - script: |
      npx @vscode/vsce package --out $(Build.ArtifactStagingDirectory)/guid-visual-overlay-$(EXTENSION_VERSION).vsix
    displayName: "Package VSIX"
