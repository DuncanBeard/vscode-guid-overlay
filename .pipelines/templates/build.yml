parameters:
  - name: buildType
    displayName: "Build type"
    type: string
    default: "CI"
    values:
      - CI
      - Official

steps:
  - task: NodeTool@0
    displayName: "Install Node.js"
    inputs:
      versionSpec: "20.x"

  - script: |
      npm ci --maxsockets=3 --verbose 2>&1 || {
        echo "##[warning]npm ci failed, dumping debug log..."
        cat /root/.npm/_logs/*-debug-*.log 2>/dev/null || echo "No debug log found"
        exit 1
      }
    displayName: "Install dependencies"
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"

  - script: npm test
    displayName: "Run tests"

  - script: npm run vscode:prepublish
    displayName: "Production build"

  - script: |
      npx @vscode/vsce package --out $(Build.ArtifactStagingDirectory)/guid-visual-overlay.vsix
    displayName: "Package VSIX"
