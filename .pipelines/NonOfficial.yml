#################################################################################
#              OneBranch Non-Official Pipeline - GUID Visual Overlay             #
#  Build-only pipeline for PR validation and CI testing (no approval gates)     #
#################################################################################

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main
      - "release/*"

parameters:
  - name: debug
    displayName: "Enable debug output"
    type: boolean
    default: false

resources:
  repositories:
    - repository: templates
      type: git
      name: OneBranch.Pipelines/GovernedTemplates
      ref: refs/heads/main

extends:
  template: v2/OneBranch.Official.CrossPlat.yml@templates
  parameters:
    globalSdl:
      tsa:
        enabled: false

    stages:
      - stage: Build
        displayName: "Build & Package VSIX"
        jobs:
          - job: build
            displayName: "Build VSIX"
            pool:
              type: linux

            variables:
              ob_outputDirectory: "$(Build.ArtifactStagingDirectory)"
              ob_artifactBaseName: drop_vsix_package

            steps:
              - template: /.pipelines/templates/build.yml@self
                parameters:
                  buildType: CI
